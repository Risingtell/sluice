<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:#0a0a0a}
  .logo{width:480px;height:480px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(420px 280px at 50% 32%, rgba(255,212,0,.10), rgba(255,212,0,0) 65%), #0a0a0a;
    font-family:"Segoe UI",Inter,system-ui,sans-serif;position:relative;overflow:hidden}
  .drop{font-size:150px;line-height:1;filter:drop-shadow(0 6px 30px rgba(255,212,0,.35))}
  .name{font-size:88px;font-weight:800;letter-spacing:-.03em;color:#f5f5f5;margin-top:6px}
  .name b{color:#ffd400}
  .tag{margin-top:14px;font-size:21px;letter-spacing:.02em;color:#a3a3a3;font-weight:500}
  /* a thin "per-second" tick line under the wordmark */
  .ticks{margin-top:20px;display:flex;gap:9px}
  .ticks i{width:7px;height:7px;border-radius:50%;background:#ffd400;opacity:.85}
  .ticks i:nth-child(4){opacity:.5}.ticks i:nth-child(5){opacity:.28}
</style></head>
<body>
  <div class="logo" id="logo">
    <div class="drop">💧</div>
    <div class="name">Slu<b>i</b>ce</div>
    <div class="tag">pay&nbsp;by&nbsp;the&nbsp;second</div>
    <div class="ticks"><i></i><i></i><i></i><i></i><i></i></div>
  </div>
</body>
</html>
