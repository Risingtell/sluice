# Fly.io deploy config for the Sluice LIVE proof-feed server.
# App name is finalized at create time (see HOSTING.md). The agent / scripts/volume.sh keep
# running locally against this server's public URL — only the server needs to be always-on.
app = "sluice-x402"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MODE = "live"
  PORT = "4021"
  SNAPSHOT_PATH = "/data/impact.json"

# Durable proof feed: the 138+ settlements live on this volume and survive restarts/redeploys.
[mounts]
  source = "sluice_data"
  destination = "/data"

[http_service]
  internal_port = 4021
  force_https = true
  # Scale to zero when idle (≈ free); a judge's request wakes it in ~1–2s. Volume keeps the data.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
